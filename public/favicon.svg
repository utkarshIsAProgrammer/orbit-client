<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#orbitGradient)" stroke-width="4" opacity="0.3"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#orbitGradient)" stroke-width="3" opacity="0.4" stroke-dasharray="80 160"/>
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#orbitGradient)" stroke-width="3" opacity="0.5" stroke-dasharray="60 120"/>
  
  <g filter="url(#glow)">
    <circle cx="64" cy="64" r="16" fill="url(#orbitGradient)"/>
    <circle cx="64" cy="64" r="8" fill="#000000" opacity="0.2"/>
  </g>
  
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#orbitGradient)" stroke-width="4" stroke-dasharray="40 260" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 64 64" to="360 64 64" dur="12s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#orbitGradient)" stroke-width="3" stroke-dasharray="30 210" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="360 64 64" to="0 64 64" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
